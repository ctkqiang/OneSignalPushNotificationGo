basePath: /
definitions:
  structure.Locale:
    enum:
    - en
    - zh
    type: string
    x-enum-varnames:
    - LocaleEN
    - LocaleZH
  structure.NotificationContent:
    properties:
      channel:
        type: string
      image_url:
        type: string
      locale:
        $ref: '#/definitions/structure.Locale'
      message:
        type: string
      segments:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
info:
  contact: {}
  description: 提供推送通知相关的 API 接口
  title: 推送通知服务
  version: "1.0"
paths:
  /push/text:
    post:
      consumes:
      - application/json
      description: |-
        发送通用文本推送通知到所有用户。此端点用于发送面向全体用户的通知，如系统公告、重要更新等。
        警告：请勿使用此端点发送用户特定的通知，因为它会广播给所有用户。对于用户特定的通知，请使用专门的用户定向通知端点。
      parameters:
      - description: 通知内容
        in: body
        name: notification
        required: true
        schema:
          $ref: '#/definitions/structure.NotificationContent'
      produces:
      - application/json
      responses:
        "200":
          description: 成功响应
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 发送文本推送通知
      tags:
      - 通知
swagger: "2.0"
