version: "3.8"
services:
  pushservice:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - internal/config/.env
    environment:
      - DOCKER_ENV=true
      - MONGODB_HOST=mongodb
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080/swagger/index.html",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - mongodb
    networks:
      - pushservice-network

  mongodb:
    image: mongo:6.0-focal
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27018:27017"
    networks:
      - pushservice-network
    mem_limit: 512m
    cpus: 0.5

volumes:
  mongodb_data:

networks:
  pushservice-network:
    driver: bridge
